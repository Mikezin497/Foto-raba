<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Foto raba dinovo?</title>

<style>

body{
background:#cfe9ff;
font-family:Arial, sans-serif;
text-align:center;
margin-top:120px;
overflow:hidden;
}

h1{
font-size:42px;
color:#cc041f;
}

button{
font-size:22px;
padding:15px 35px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#sim{
background:#156904;
color:white;
}

#nao{
background:#ff0000;
color:white;
position:absolute;
}

.frase{
font-size:20px;
color:#bd1c0a;
margin-top:8px;
}

/* corações */

.heart{
position:fixed;
bottom:-20px;
animation:subir 6s linear infinite;
opacity:0.8;
}

@keyframes subir{
0%{transform:translateY(0);opacity:0.8;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* anuncio */

#anuncio{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-size:50px;
padding:40px;
z-index:999;
display:none;
animation:zoom 0.6s;
}

@keyframes zoom{
from{transform:scale(0.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<h1 id="titulo">Foto raba dinovo??</h1>

<button id="sim" onclick="ir()">Sim</button>
<button id="nao" onclick="nao()">Não</button>

<div id="frases"></div>

<div id="anuncio">
Nao tem como escapar, aperte em sim e aceite<br><br>
(é so brincadeira ta? te amo muito)<br><br>
</div>

<script>

let tamanho = 22
let cliques = 0
let indiceMensagem = 0

const mensagens = [
"Não adianta negar...",
"Mande",
"Aceitaaa",
"Não correeeeee",
"Vai simm",
"Eu queroo",
"Sim",
"Yes",
"Si",
"No adianta correr",
"vai ter q mandarr",
]

function ir(){
window.location.href="https://i.pinimg.com/736x/ba/db/74/badb74e6bf6c22cab8c7ce38c3a83eff.jpg"
}

function nao(){

cliques++

if(cliques >= 20){

document.getElementById("nao").style.display="none"
document.getElementById("anuncio").style.display="flex"

/* depois de 12s some anuncio */

setTimeout(()=>{

document.getElementById("anuncio").style.display="none"
document.getElementById("titulo").style.display="none"
document.getElementById("frases").style.display="none"

/* deixa o SIM gigante */

let sim=document.getElementById("sim")

sim.style.position="fixed"
sim.style.top="0"
sim.style.left="0"
sim.style.width="100%"
sim.style.height="100%"
sim.style.fontSize="80px"

},12000)

return
}

let botao=document.getElementById("nao")

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-60)

botao.style.left=x+"px"
botao.style.top=y+"px"

/* crescer sim */

tamanho+=15
let sim=document.getElementById("sim")

sim.style.fontSize=tamanho+"px"
sim.style.padding=(tamanho/2)+"px "+tamanho+"px"

/* frases */

let frase=document.createElement("div")
frase.className="frase"

frase.innerText = mensagens[indiceMensagem]

indiceMensagem++

if(indiceMensagem >= mensagens.length){
indiceMensagem = 0
}

document.getElementById("frases").appendChild(frase)

}

/* corações */

function criarCoracao(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💕"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(criarCoracao,400)

</script>

</body>
</html>
